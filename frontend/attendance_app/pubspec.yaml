name: attendance_app
description: Smart Attendance System — Secure mobile attendance with QR, GPS, biometrics.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0

  # Device & Security
  local_auth: ^2.1.8
  mobile_scanner: ^3.5.6
  geolocator: ^10.1.0
  device_info_plus: ^9.1.2
  flutter_secure_storage: ^9.0.0
  uuid: ^4.3.3
  crypto: ^3.0.3

  # State & Network
  provider: ^6.1.2
  http: ^1.2.0

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  lottie: ^3.1.0
  qr_flutter: ^4.1.0
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/
